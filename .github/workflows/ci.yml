name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: Python Tests (Installer)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Apollova-Installer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest rapidfuzz pydub

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  vitest:
    name: TypeScript Tests (MCP Server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ../ae-mcp-plugin/packages/mcp-server

    steps:
      - uses: actions/checkout@v4
        with:
          repository: AliBars19/ae-mcp-plugin

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Run tests
        run: npx vitest run
        working-directory: packages/mcp-server

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: AliBars19/ae-mcp-plugin

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        working-directory: packages/mcp-server
